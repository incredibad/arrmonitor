<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 60">
  <defs>
    <clipPath id="lh"><rect x="10" y="10" width="20" height="40"/></clipPath>
    <clipPath id="rh"><rect x="30" y="10" width="20" height="40"/></clipPath>
  </defs>

  <!-- Icon background -->
  <rect x="10" y="10" width="40" height="40" rx="9" fill="#0f0f14"/>

  <!-- Left half: blue -->
  <g clip-path="url(#lh)">
    <circle cx="30" cy="30" r="13" fill="none" stroke="#29b6f6" stroke-width="2.5"/>
    <ellipse cx="30" cy="30" rx="6.5" ry="9" fill="none" stroke="#29b6f6" stroke-width="2"/>
    <circle cx="30" cy="30" r="3.5" fill="#29b6f6"/>
  </g>

  <!-- Right half: amber -->
  <g clip-path="url(#rh)">
    <circle cx="30" cy="30" r="13" fill="none" stroke="#ffa726" stroke-width="2.5"/>
    <ellipse cx="30" cy="30" rx="6.5" ry="9" fill="none" stroke="#ffa726" stroke-width="2"/>
    <circle cx="30" cy="30" r="3.5" fill="#ffa726"/>
  </g>

  <!-- Text: Arr in blue/amber split, Monitor in muted -->
  <text x="62" y="36" font-family="DM Sans, Inter, sans-serif" font-size="22" font-weight="700" fill="#f5eddf" letter-spacing="1">ARRMONITOR</text>
</svg>
